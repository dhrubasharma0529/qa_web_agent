name: CI/CD Pipeline

on:
  push:
    branches: [ci:git_action, main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    # Run tests on both branches and PRs to main
    if: github.event_name == 'push' || github.event_name == 'pull_request'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run pytest
        run: pytest -q

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install Node.js dependencies
        run: npm ci

      - name: Install Cypress system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-0 \
            libnotify-dev \
            libgconf-2-4 \
            libnss3 \
            libxss1 \
            libasound2 \
            libxtst6 \
            xauth \
            xvfb

      - name: Verify Cypress installation
        run: npx cypress verify

      - name: Run Cypress tests
        run: npx cypress run --browser chrome --headless

  deploy:
    name: Deploy to Production
    needs: test
    runs-on: ubuntu-latest
    # Only deploy when changes are pushed to main (not on PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: SSH to EC2 and deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -euo pipefail

            echo "==> Pulling latest from main"
            cd /home/ubuntu/apps/qa_web_agent
            git pull --ff-only origin main

            echo "==> Building Docker image with Cypress dependencies"
            docker compose build

            echo "==> Starting / restarting container"
            docker compose up -d

            echo "==> Pruning old images"
            docker image prune -f

            echo "==> Waiting for app to come up"
            sleep 8

            echo "==> Health check"
            curl --fail --silent http://localhost:8000/health
            echo
            
            echo "==> Running Cypress verification in container"
            docker compose exec -T web npx cypress verify || echo "Cypress verification might need GUI dependencies"
            
            echo "Production deploy successful."
