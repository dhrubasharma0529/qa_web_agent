# CD — runs on every push to main (i.e., every PR merge).
# Re-runs CI tests; if green, SSHes to EC2 and deploys.
# A failure at any step keeps the previous version live on the box.

name: Deploy

on:
  push:
    branches: [main]

jobs:
  test:
    name: Tests (re-run before deploy)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run pytest
        run: pytest -q

  deploy:
    name: Deploy to EC2
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: SSH to EC2 and deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -euo pipefail

            cd /home/ubuntu/apps/qa_web_agent

            echo "==> Syncing to origin/main (discards local mutations from agent runs)"
            git fetch --prune origin main
            git reset --hard origin/main
            git clean -fd -- cypress/e2e cypress/support/pages reports

            echo "==> Building Docker image"
            docker compose build

            echo "==> Starting / restarting container"
            docker compose up -d

            echo "==> Pruning old images"
            docker image prune -f

            echo "==> Health check (poll up to 60s)"
            for i in $(seq 1 30); do
              if curl --fail --silent --max-time 2 http://localhost:8000/health >/dev/null; then
                echo "Healthy after ${i} attempt(s)."
                echo "Deploy successful."
                exit 0
              fi
              sleep 2
            done

            echo "Health check failed after 60s. Recent container logs:"
            docker compose logs --tail=100 qa-agent || true
            exit 1
